<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5e1622">
<title>이마트 winelist</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="이마트 winelist">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="topbar" id="topbar">
      <button class="iconbtn back" id="backBtn" aria-label="뒤로">‹</button>
      <div class="brand">
          <div class="brand-ey">E M A R T&nbsp; C E L L A R</div>
                <div class="brand-title" id="brandTitle">이마트 <span>winelist</span></div>
      <button class="iconbtn" id="homeBtn" aria-label="홈">⌂</button>
    </header>

    <div class="controls" id="controls">
      <div class="searchrow">
        <input id="searchInput" type="search" placeholder="품종·와인명 검색 (예: 피노 누아, 폴로저)" autocomplete="off">
      </div>
      <div class="pairrow">
        <input id="foodInput" type="text" placeholder="🍽  음식을 입력하면 TOP 3 추천 (예: 스테이크, 회, 치즈)">
        <button id="pairBtn">마리아주</button>
      </div>
      <div class="chiprow" id="quickRow">
        <button class="seg active" data-color="all">전체</button>
        <button class="seg" data-color="레드">레드</button>
        <button class="seg" data-color="화이트">화이트</button>
        <button class="seg" data-color="스파클링">스파클링</button>
        <button class="seg" data-color="디저트">디저트</button>
        <button class="seg" data-color="로제">로제</button>
        <span class="spacer"></span>
        <button class="filterbtn" id="filterBtn">⚙ 필터 <span id="filterCount"></span></button>
      </div>
      <div class="resultmeta" id="resultMeta"></div>
    </div>

    <main id="view"></main>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h2>맛 · 향 · 가격 · 마리아주 필터</h2>
      <button class="iconbtn" id="drawerClose" aria-label="닫기">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-foot">
      <button class="btn ghost" id="resetFilters">초기화</button>
      <button class="btn solid" id="applyFilters">결과 보기</button>
    </div>
  </aside>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
